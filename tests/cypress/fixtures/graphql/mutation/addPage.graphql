mutation AddPage($parentPath: String!, $name: String!, $template: String!) {
  jcr {
    addNode(
      parentPathOrId: $parentPath
      name: $name
      primaryNodeType: "jnt:page"
      properties: [
        {name: "j:templateName", value: $template}
      ]
    ) {
      node {
        uuid
        path
      }
    }
  }
}
